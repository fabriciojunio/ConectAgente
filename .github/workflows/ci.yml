name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-mobile:
    name: Testes App Mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ConectAgente-mobile/package-lock.json
      - name: Instalar dependencias
        working-directory: ConectAgente-mobile
        run: npm ci
      - name: Executar testes
        working-directory: ConectAgente-mobile
        run: npm test -- --passWithNoTests

  build-web:
    name: Build Portal Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ConectAgente-web/package-lock.json
      - name: Instalar dependencias
        working-directory: ConectAgente-web
        run: npm ci
